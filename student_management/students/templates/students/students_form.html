{% extends 'base.html' %}
{% load static %}

{% block title %}Add Student{% endblock %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/students.css' %}">
{% endblock %}

{% block content %}

<section class="py-5">

    <div class="container">

        <!-- Heading -->
        <div class="text-center mb-4">

            <h2 class="fw-bold text-primary">
                <i class="bi bi-person-plus-fill"></i>
                Add Student
            </h2>

            <p class="text-muted">
                Fill in the student's information below.
            </p>

        </div>

        <div class="row justify-content-center">

            <div class="col-lg-9">

                <div class="card shadow-lg border-0 student-form-card">

                    <div class="card-header bg-primary text-white py-3">

                        <h4 class="mb-0">
                            Student Information
                        </h4>

                    </div>

                    <div class="card-body p-4">

                        <form method="POST" action="{% url 'form' %}" enctype="multipart/form-data">

                            {% csrf_token %}

                            <div class="row">

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Full Name
                                    </label>

                                    <input type="text" name="name" class="form-control" placeholder="Enter full name"
                                        required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Phone Number
                                    </label>

                                    <input type="tel" name="number" pattern="98[0-9]{8}" maxlength="10"
                                        class="form-control" placeholder="98XXXXXXXX" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Email
                                    </label>

                                    <input type="email" name="email" class="form-control"
                                        placeholder="example@gmail.com" required>

                                </div>

                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Date of Birth
                                    </label>

                                    <input type="date" name="dob" class="form-control" required>

                                </div>


                                <div class="col-md-6 mb-3">

                                    <label class="form-label">
                                        Profile Image
                                    </label>

                                    <input type="file" name="image" class="form-control" required>

                                </div>

                                <div class="col-12 mb-4">

                                    <label class="form-label" for="address">
                                        Address
                                    </label>

                                    <input type="text" name="address" id="address" class="form-control" required>

                                </div>

                            </div>

                            <div class="d-flex justify-content-end">

                                <a href="{% url 'list' %}" class="btn btn-outline-secondary me-2">

                                    <i class="bi bi-arrow-left"></i>

                                    Back

                                </a>

                                <button class="btn btn-primary px-4">

                                    <i class="bi bi-check-circle-fill"></i>

                                    Save Student

                                </button>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>
{% endblock %}
